<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      .bg { fill: #0b0d10; }
      .border { fill: #1f242c; }
      .accent { fill: #7ee787; }
      .text { fill: #e6edf3; }
      .muted { fill: #7d8590; }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; }
    </style>
  </defs>
  <rect class="bg" width="1200" height="630"/>
  <rect class="border" x="0" y="0" width="1200" height="2"/>

  <!-- pixel-art dumbbell logo (top-right corner) -->
  <g shape-rendering="crispEdges" transform="translate(960, 80) scale(5)">
    <rect x="2" y="8" width="8" height="2" class="accent"/>
    <rect x="2" y="22" width="8" height="2" class="accent"/>
    <rect x="2" y="10" width="2" height="12" class="accent"/>
    <rect x="8" y="10" width="2" height="12" class="accent"/>
    <rect x="10" y="14" width="12" height="4" class="text"/>
    <rect x="22" y="8" width="8" height="2" class="accent"/>
    <rect x="22" y="22" width="8" height="2" class="accent"/>
    <rect x="22" y="10" width="2" height="12" class="accent"/>
    <rect x="28" y="10" width="2" height="12" class="accent"/>
  </g>

  <text class="mono text" x="120" y="180" font-size="36" font-weight="600">big-o-gym</text>
  <text class="mono accent" x="120" y="320" font-size="84" font-weight="700">O(n log n)?</text>
  <text class="mono text" x="120" y="430" font-size="36">Read the code, type the complexity,</text>
  <text class="mono text" x="120" y="478" font-size="36">learn what trips you up.</text>
  <text class="mono muted" x="120" y="560" font-size="22">interview-shaped problems · python &amp; javascript · bigogym.io</text>
</svg>
