<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Free tool for practicing time and space complexity analysis on code snippets in Python and JavaScript. Designed for technical interview prep — type the answer, get instant feedback."
    />
    <meta name="theme-color" content="#0b0d10" />
    <title>Big O Gym — practice time and space complexity for interviews</title>

    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bigogym.io/" />
    <meta property="og:title" content="Big O Gym" />
    <meta
      property="og:description"
      content="Free tool for practicing time and space complexity analysis. Interview prep for Python and JavaScript."
    />
    <meta property="og:image" content="/og.svg" />
    <meta property="og:image:type" content="image/svg+xml" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@j3balian" />
    <meta name="twitter:creator" content="@j3balian" />
    <meta name="twitter:title" content="Big O Gym" />
    <meta
      name="twitter:description"
      content="Free tool for practicing time and space complexity analysis. Interview prep for Python and JavaScript."
    />
    <meta name="twitter:image" content="/og.svg" />

    <link rel="canonical" href="https://bigogym.io/" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Big O Gym",
        "url": "https://bigogym.io/",
        "description": "Free tool for practicing time and space complexity analysis on code snippets in Python and JavaScript. Designed for technical interview prep.",
        "applicationCategory": "EducationalApplication",
        "operatingSystem": "Any (web)",
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
      }
    </script>
    <!--
      Analytics is wired through PostHog (src/lib/posthog-init.ts). It reads
      VITE_POSTHOG_KEY at build time. Set it in .env.local for dev or in
      your hosting provider's env vars for prod (Cloudflare Pages, Vercel,
      Netlify all support build-time env vars). No script tag needed here.
    -->
  </head>
  <body class="bg-bg text-text">
    <script>
      // Apply persisted theme before React mounts to avoid a flash.
      (function () {
        try {
          var t = localStorage.getItem('complexity-practice:v1:theme');
          document.documentElement.dataset.theme =
            t === 'light' ? 'light' : 'dark';
        } catch (_) {
          document.documentElement.dataset.theme = 'dark';
        }
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
